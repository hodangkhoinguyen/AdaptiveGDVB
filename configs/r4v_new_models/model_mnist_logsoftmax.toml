[distillation]
maxmemory = "128G"
threshold = 1e-9
cuda = true
type = "classification"
precompute_teacher = true
save_intermediate = false

[distillation.parameters]
epochs = 1
optimizer = "adam"
loss = "MSE"
learning_rate = 0.001

[distillation.data]
format = "mnist"
batchsize = 64
presized = false
path = "./data/mnist"

[distillation.teacher]
framework = "onnx"
input_shape = [ 1, 1, 28, 28,]
input_format = "NCHW"
model = "configs/M3x1024.onnx"

[distillation.data.train]
shuffle = true

[distillation.data.validation]
shuffle = false

[distillation.data.transform.teacher]
grayscale = true
mean = [ 0.1307,]
std = [ 0.3081,]
height = 28
width = 28
min_value = 0
max_value = 1

[distillation.data.transform.student]
grayscale = true
mean = [ 0.1307,]
std = [ 0.3081,]
height = 28
width = 28
min_value = 0
max_value = 1

[[distillation.strategies.add_layer]]
layer_type="FullyConnected"
parameters=1024
activation_function="logsoftmax"
layer_id=[3]

[distillation.student]
path="./mnist_logsoftmax_result.onnx"
